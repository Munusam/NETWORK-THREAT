services:
  # Layer 2: Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web Console Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    mem_limit: 512m
    volumes:
      - minio_data:/data

  # Layer 1: Data Ingestion
  kafka:
    image: bitnamilegacy/kafka:latest # <-- Updated repository
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_NODE_ID=1
      - ALLOW_PLAINTEXT_LISTENER=yes
    mem_limit: 1g
    volumes:
      - kafka_data:/bitnami/kafka

  # Layer 3: Processing (Experimentation Environment)
  jupyter-spark:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: jupyter-spark
    ports:
      - "8888:8888" # Jupyter Lab UI
      - "4040:4040" # Spark UI for monitoring jobs
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=9f14e6d8e80750f81cb633876c5e99cdee178febca8bf6e0
      # Passing MinIO credentials directly into the container
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    mem_limit: 1g
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data

  # Layer 4: Orchestration
  airflow:
    image: apache/airflow:2.9.1-python3.10
    container_name: airflow
    ports:
      - "8080:8080" # Airflow UI
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__WEBSERVER__WORKERS=1 # <--- THE FIX: Force only 1 web worker
    command: >
      bash -c "airflow db migrate && 
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && 
      airflow webserver & airflow scheduler"
    mem_limit: 1g # <--- BUMP to 1GB
    volumes:
      - ./dags:/opt/airflow/dags

  # Layer 6: Experiment Tracking & Model Registry
  mlflow:
    image: python:3.10-slim
    container_name: mlflow
    ports:
      - "5050:5000" # MLflow UI Port
    environment:
      # We use s3:// here because boto3 (AWS SDK) expects it, while Spark uses s3a://
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    command: >
      /bin/bash -c "pip install mlflow boto3 && 
      mlflow server --host 0.0.0.0 --workers 1 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root s3://mlflow-artifacts/ --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5050"
    mem_limit: 1g
    volumes:
      - mlflow_fresh_db:/mlflow

  # Layer 7: Model Serving (BentoML REST API)
  model-api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: model-api
    ports:
      - "3030:3000"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MLFLOW_RUN_ID=f19b25fe2f5f49a7a35fcbb30c9cd095 # <--- PASTE YOUR RUN ID HERE!
    mem_limit: 1g

  # Layer 8: Monitoring (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    mem_limit: 256m

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3050:3000" # We use 3050 so it doesn't fight with BentoML!
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    mem_limit: 256m

# ... (all your services are up here)

volumes:
  minio_data:
  kafka_data:
  mlflow_fresh_db:

